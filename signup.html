<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">

    <!-- Left Section (Signup Form) -->
    <div Class ="w-full md:w-1/2 flex flex-col items-center justify-center bg-green-900 p-6 text-white">
        <div Class ="w-full max-w-md">
          <img src="favicon.png" alt="Logo" Class ="mx-auto mb-6 w-16 h-auto" />

          <h2 Class ="text-2xl font-semibold mb-6 text-center">Account Registration</h2>

          <!-- Code Verification Section -->
          <div id="codeSection" Class ="bg-green-800 p-6 rounded-lg mb-6">
            <h3 Class ="text-xl font-medium mb-4 text-center text-yellow-300">
              Enter Access Code
            </h3>
            <p Class ="mb-4 text-center">
              Enter the access code to proceed with registration.
            </p>
            <input type="text" id="accessCode" placeholder="Enter code" Class ="w-full p-3 mb-4 rounded bg-green-700 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
            <button id="verifyCode" Class ="w-full bg-yellow-500 text-gray-900 py-3 rounded font-semibold hover:bg-yellow-600 transition">
              Verify Code
            </button>
          </div>

          <!-- Signup Form (Hidden initially) -->
          <div id="signupForm" Class ="bg-green-800 p-6 rounded-lg mb-6 hidden">
            <h3 Class ="text-xl font-medium mb-4 text-center text-yellow-300">
              Create Your Account
            </h3>
            <form id="signupFormElement">
              <div Class ="mb-4">
                <input type="text" id="username" placeholder="Username" required Class ="w-full p-3 rounded bg-green-700 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
              </div>
              <div Class ="mb-4">
                <input type="email" id="email" placeholder="Email" required Class ="w-full p-3 rounded bg-green-700 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
              </div>
              <div Class ="mb-4">
                <input type="password" id="password" placeholder="Password" required Class ="w-full p-3 rounded bg-green-700 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
              </div>
              <div Class ="mb-4">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required Class ="w-full p-3 rounded bg-green-700 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
              </div>
              <div Class ="mb-4 flex items-center">
                <input type="checkbox" id="termsCheckbox" required Class ="mr-2">
                <label for="termsCheckbox" Class ="text-sm">
                  I accept the <a href="privacy.html" Class ="text-yellow-300 underline">Terms & Conditions</a>
                </label>
              </div>
              <button type="submit" id="signupButton" Class ="w-full bg-yellow-500 text-gray-900 py-3 rounded font-semibold hover:bg-yellow-600 transition">
                Sign Up
              </button>
            </form>
          </div>

          <div Class ="text-center">
            <p Class ="text-sm mb-4">
              Already have an account?
            </p>
            <button 
              class = "inline-block bg-yellow-500 text-gray-900 px-6 py-2 rounded-full font-semibold hover:bg-yellow-600 transition">
              Login
            </button>
          </div>
        </div>
      </div>

    <!-- Right Section (Illustration & Dynamic Typing Text) -->
    <div class="w-full md:w-1/2 flex flex-col items-center justify-center bg-white px-6 py-12 md:px-12">
        <h2 class="text-2xl font-bold mb-4 text-center">
            Start managing <span class="text-green-700">free</span> now!
        </h2>
        <p class="text-center mb-6 px-4 text-lg">
            Sukuu is a 100% online 
            <span id="dynamic-text" class="font-bold text-yellow-500"></span>
            management software for a lifetime with less cost and no limitations.
        </p>
        <img src="illustration2.png" alt="Illustration" class="w-full max-w-xs sm:max-w-sm md:max-w-md h-auto">
    </div>

    <script src="signup.js"></script>

    <script>
        const words = ["School", "Business", "Training Centre", "Academy"];
        let index = 0;
        let charIndex = 0;
        let isDeleting = false;
        const textElement = document.getElementById("dynamic-text");

        function typeEffect() {
            const currentWord = words[index];
            if (isDeleting) {
                // Remove characters one by one
                textElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                // Add characters one by one
                textElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentWord.length) {
                setTimeout(() => (isDeleting = true), 1000);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                index = (index + 1) % words.length;
            }

            setTimeout(typeEffect, isDeleting ? 50 : 100);
        }

        // Start animation
        typeEffect();
    </script>

</body>
</html>
